services:
  backend:
    build:
      context: ./Back-end
      dockerfile: Dockerfile
    container_name: mern-backend
    restart: always
    env_file:
      - ./Back-end/.env
    ports:
      - "3000:3000"
    networks:
      - mern-network

  frontend:
    build:
      context: ./Front-end
      dockerfile: Dockerfile
    container_name: mern-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
