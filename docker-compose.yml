version: "3.9"
services:
  backend:
    image: waseemmalik547/mern-chat-app-backend:latest
    container_name: mern-backend
    restart: always
    env_file: ./Back-end/.env
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    networks:
      - mern-network

  frontend:
    image: waseemmalik547/mern-chat-app-frontend-prod:latest
    container_name: mern-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
